services:
  front:
    build:
      dockerfile: apps/front/Dockerfile
    environment:
      - API_URL=http://host.docker.internal:8080
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/front/infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - front