services:
  postgres:
    # https://hub.docker.com/_/postgres
    image: postgres:18.3
    container_name: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d
    env_file:
      - ./infra/database/.env
    ports:
      - "5432:5432"
    networks:
      - app-network
  pgadmin:
    # https://hub.docker.com/r/dpage/pgadmin4
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    volumes:
      - pgadmin_working_dir:/var/lib/pgadmin
      - pgadmin_config_dir:/pgadmin4
    env_file:
      - ./infra/database/.env
    depends_on:
      - postgres
    ports:
      - "5433:80"
    networks:
      - app-network

volumes:
  postgresql_data:
    driver: local
  pgadmin_working_dir:
    driver: local
  pgadmin_config_dir:
    driver: local

networks:
  app-network:
    external: true